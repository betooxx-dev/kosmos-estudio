<!DOCTYPE html>
<html data-composition-id="escena-intro">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: "Bebas Neue", "Impact", sans-serif;
    }

    .fondo {
      position: absolute;
      inset: 0;
      background: var(--color-fondo, #0a0a0a);
    }

    .acento-linea {
      position: absolute;
      left: 0;
      top: 0;
      width: 12px;
      height: 100%;
      background: var(--color-primario, #C41E3A);
    }

    .foto-container {
      position: absolute;
      right: 80px;
      bottom: 0;
      width: 680px;
      height: 1080px;
      overflow: hidden;
    }

    .foto-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .foto-gradiente {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        var(--color-fondo, #0a0a0a) 0%,
        transparent 40%
      );
    }

    .contenido {
      position: absolute;
      left: 120px;
      top: 50%;
      transform: translateY(-50%);
    }

    .evento-label {
      font-size: 28px;
      letter-spacing: 8px;
      color: var(--color-secundario, #FFD700);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .apodo {
      font-size: 180px;
      line-height: 0.9;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: -4px;
    }

    .nombre {
      font-size: 48px;
      color: var(--color-primario, #C41E3A);
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-top: 16px;
    }

    .division {
      font-size: 32px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="fondo"></div>
  <div class="acento-linea" id="linea"></div>

  <div class="foto-container" id="foto">
    <img id="foto-img" src="" alt="" />
    <div class="foto-gradiente"></div>
  </div>

  <div class="contenido">
    <div class="evento-label" id="evento"></div>
    <div class="apodo" id="apodo"></div>
    <div class="nombre" id="nombre"></div>
    <div class="division" id="division"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const vars = window.__hyperframes.getVariables();

    // Aplicar variables CSS
    document.documentElement.style.setProperty("--color-fondo", vars.color_fondo || "#0a0a0a");
    document.documentElement.style.setProperty("--color-primario", vars.color_primario || "#C41E3A");
    document.documentElement.style.setProperty("--color-secundario", vars.color_secundario || "#FFD700");

    // Contenido
    document.getElementById("foto-img").src = vars.persona_foto || "";
    document.getElementById("evento").textContent = vars.titulo_evento || "";
    document.getElementById("apodo").textContent = vars.persona_apodo || "";
    document.getElementById("nombre").textContent = vars.persona_nombre || "";
    document.getElementById("division").textContent = vars.persona_division || "";

    // Timeline GSAP (obligatorio registrar en window.__timelines)
    const tl = gsap.timeline({ paused: true });

    tl.from("#linea", { scaleY: 0, transformOrigin: "top", duration: 0.4, ease: "power2.out" })
      .from("#evento", { opacity: 0, y: 20, duration: 0.4, ease: "power2.out" }, "-=0.1")
      .from("#apodo", { opacity: 0, x: -60, duration: 0.6, ease: "power3.out" }, "-=0.2")
      .from("#nombre", { opacity: 0, x: -40, duration: 0.4, ease: "power2.out" }, "-=0.3")
      .from("#division", { opacity: 0, x: -30, duration: 0.4, ease: "power2.out" }, "-=0.2")
      .from("#foto", { opacity: 0, x: 80, duration: 0.7, ease: "power3.out" }, 0.1);

    window.__timelines = window.__timelines || {};
    window.__timelines["escena-intro"] = tl;
  </script>
</body>
</html>
